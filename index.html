<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 TCAS71 Master Planner — Dek71</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0a0a14;min-height:100vh;color:#e0e0e0;padding:12px}
.ctn{max-width:1600px;margin:0 auto}
h1{text-align:center;font-size:1.7rem;margin-bottom:4px;background:linear-gradient(90deg,#f093fb,#f5576c,#feca57,#48dbfb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{text-align:center;color:#777;margin-bottom:16px;font-size:.8rem}
/* Top Nav */
.tnav{display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tbtn{padding:9px 22px;border:2px solid rgba(255,255,255,.08);border-radius:25px;background:transparent;color:#aaa;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s}
.tbtn:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}
.tbtn.act{background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-color:#6c5ce7;color:#fff}
.abtn{margin-left:auto;display:flex;gap:8px}
.sv{padding:7px 16px;border:none;border-radius:18px;background:#27ae60;color:#fff;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s}
.sv:hover{background:#2ecc71;transform:scale(1.05)}.sv.us{background:#e67e22;animation:ps 1.5s infinite}
.rs{padding:7px 16px;border:none;border-radius:18px;background:#c0392b;color:#fff;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s}
.rs:hover{background:#e74c3c;transform:scale(1.05)}
@keyframes ps{0%,100%{opacity:1}50%{opacity:.6}}
/* Dashboard */
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.dc{background:rgba(255,255,255,.04);border-radius:10px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.dc .dl{font-size:.63rem;color:#888}.dc .dv{font-size:1.2rem;font-weight:800;margin:2px 0}.dc .db{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}.dc .df{height:100%;border-radius:2px;transition:width .4s}
/* Sections */
.sec{display:none}.sec.act{display:block}
/* CHECKLIST */
.ctabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.ctab{padding:6px 14px;border:none;border-radius:18px;cursor:pointer;font-size:.75rem;font-weight:600;background:rgba(255,255,255,.06);color:#aaa;transition:all .2s}
.ctab:hover{background:rgba(255,255,255,.1)}
.ctab.act{color:#fff}
.ct-math.act{background:#e74c3c}.ct-phys.act{background:#3498db}.ct-chem.act{background:#f39c12}.ct-bio.act{background:#27ae60}.ct-eng.act{background:#9b59b6}.ct-tpat.act{background:#e67e22}.ct-thai.act{background:#1abc9c}.ct-soc.act{background:#e91e63}.ct-tgat.act{background:#00b894}.ct-tpat3.act{background:#6c5ce7}
.cfilts{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.cflt{padding:4px 10px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:transparent;color:#aaa;cursor:pointer;font-size:.7rem;transition:all .2s}
.cflt:hover,.cflt.act{background:rgba(255,255,255,.08);border-color:#48dbfb;color:#48dbfb}
.ccat{margin-bottom:18px}
.cch{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;margin-bottom:6px}
.cct{font-size:.9rem;font-weight:700;flex:1}.ccb{padding:3px 8px;border-radius:10px;font-size:.65rem;font-weight:600;color:#fff}
.be{background:#27ae60}.bm{background:#f39c12}.bh{background:#e74c3c}
.ccp{font-size:.73rem;color:#888}
.cpb{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:6px}
.cpf{height:100%;border-radius:2px;transition:width .4s}
.fe{background:#27ae60}.fm{background:#f39c12}.fh{background:#e74c3c}
.ci{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;margin-bottom:3px;border-radius:5px;transition:background .15s}
.ci:hover{background:rgba(255,255,255,.03)}
.ci input[type=checkbox]{width:16px;height:16px;min-width:16px;margin-top:2px;cursor:pointer;accent-color:#48dbfb}
.ci label{cursor:pointer;line-height:1.3;flex:1;font-size:.78rem}
.ci.dn label{text-decoration:line-through;color:#555}
.ci .cd{font-size:.68rem;color:#777;margin-top:1px}
.ci select{padding:2px 5px;border-radius:4px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#ccc;font-size:.65rem;cursor:pointer;min-width:75px}
.ci select option{background:#1a1a2e;color:#e0e0e0}
/* PLANNER */
.ptabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.ptab{padding:6px 14px;border:none;border-radius:18px;cursor:pointer;font-size:.75rem;font-weight:600;background:rgba(255,255,255,.06);color:#aaa;transition:all .2s}
.ptab:hover{background:rgba(255,255,255,.1)}.ptab.act{color:#fff}
.pvtabs{display:flex;gap:6px;margin-bottom:12px}
.pvt{padding:4px 10px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:transparent;color:#aaa;cursor:pointer;font-size:.7rem;transition:all .2s}
.pvt:hover,.pvt.act{background:rgba(255,255,255,.08);border-color:#48dbfb;color:#48dbfb}
.spg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;margin-bottom:12px}
.spc{background:rgba(255,255,255,.04);border-radius:7px;padding:7px 9px;border-left:3px solid}
.spc .sn{font-size:.68rem;font-weight:600;margin-bottom:2px}.spc .sb{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}.spc .sf{height:100%;border-radius:2px;transition:width .4s}.spc .sp{font-size:.6rem;color:#777;margin-top:2px}
.pmb{margin-bottom:14px;background:rgba(255,255,255,.03);border-radius:9px;padding:11px;border:1px solid rgba(255,255,255,.04)}
.pmb h4{font-size:.82rem;color:#feca57;margin-bottom:6px}
.pmbr{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:6px}
.pmbf{height:100%;border-radius:2px;transition:width .4s}
.pt{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.76rem}
.pt:last-child{border-bottom:none}
.pt .pc{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.pt .pc.ck{background:#27ae60;border-color:#27ae60}.pt .pc.ck::after{content:'✓';color:#fff;font-size:.55rem}
.pt.dn{opacity:.5}.pt.dn .ptx{text-decoration:line-through}
.tg{display:inline-block;padding:1px 4px;border-radius:3px;font-size:.58rem;font-weight:600;margin-right:3px}
.t-math{background:#e74c3c33;color:#ff6b6b}.t-phys{background:#3498db33;color:#74b9ff}.t-chem{background:#f39c1233;color:#fabe7c}.t-bio{background:#27ae6033;color:#7ef9cc}.t-eng{background:#9b59b633;color:#d19dfc}.t-tpat{background:#e67e2233;color:#fdcb6e}.t-thai{background:#1abc9c33;color:#81ecec}.t-soc{background:#e91e6333;color:#fd79a8}.t-tgat{background:#00b89433;color:#55efc4}.t-tpat3{background:#6c5ce733;color:#a29bfe}.t-rest{background:#636e7233;color:#b2bec3}
/* Week */
.wnav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wnav button{padding:4px 9px;border:1px solid rgba(255,255,255,.12);border-radius:5px;background:transparent;color:#ccc;cursor:pointer;font-size:.72rem}
.wnav button:hover{background:rgba(255,255,255,.06)}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.wcell{background:rgba(255,255,255,.03);border-radius:7px;padding:6px 4px;min-height:80px;border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .15s}
.wcell:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)}
.wcell .wdn{font-size:.68rem;font-weight:600;margin-bottom:4px}
.wcell .wsl{display:flex;align-items:center;gap:3px;margin-bottom:2px;font-size:.56rem}
.wcell .wdot{width:7px;height:7px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);flex-shrink:0;cursor:pointer}
.wcell .wdot.ck{background:#27ae60;border-color:#27ae60}
/* Daily */
.dly{background:rgba(255,255,255,.03);border-radius:9px;padding:12px;border:1px solid rgba(255,255,255,.04)}
.dsl{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:flex-start}
.dsl:last-child{border-bottom:none}
.dsl .dt{font-size:.7rem;color:#888;min-width:70px;padding-top:2px}
.dsl .dc2{flex:1}
.dsl .dsn{font-size:.77rem;font-weight:600;margin-bottom:1px}
.dsl .dsd{font-size:.68rem;color:#aaa}
.dsl .dck{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.dsl .dck.ck{background:#27ae60;border-color:#27ae60}.dsl .dck.ck::after{content:'✓';color:#fff;font-size:.6rem}
/* Misc */
.ub{position:fixed;top:10px;right:10px;padding:5px 12px;background:rgba(230,126,34,.9);color:#fff;border-radius:7px;font-size:.7rem;z-index:999;display:none}.ub.sh{display:block}
.st{position:fixed;bottom:12px;right:12px;padding:7px 14px;background:#27ae60;color:#fff;border-radius:7px;font-size:.75rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}.st.sh{opacity:1}
@media(max-width:768px){.wgrid{grid-template-columns:repeat(2,1fr)}.dash{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="ctn">
<h1>📚 TCAS71 Master Planner</h1>
<p class="sub">Checklist เนื้อหา + ตารางอ่านหนังสือ — Dek71 (พ.ศ. 2569–2571)</p>
<div class="tnav">
<button class="tbtn act" onclick="switchSec('checklist')" id="btnCL">📋 Checklist เนื้อหา</button>
<button class="tbtn" onclick="switchSec('planner')" id="btnPL">📅 ตารางอ่านหนังสือ</button>
<div class="abtn"><button class="sv" id="btnSave" onclick="manualSave()">💾 Save</button><button class="rs" onclick="resetAll()">🗑️ Reset</button></div>
</div>
<div class="dash" id="dashEl"></div>
<div class="sec act" id="secCL"></div>
<div class="sec" id="secPL"></div>
</div>
<div class="ub" id="ubEl">⚠️ ยังไม่ได้บันทึก</div>
<div class="st" id="stEl">💾 บันทึกแล้ว</div>
<script>

// ====== SUBJECTS (Checklist Data) ======
const CL_SUBJECTS=[

// ====== STATE ======
const SK='tcas71_master_v1';
let S=loadS();let unsaved=false;let curSec='checklist';let curCLSubj='math';let curCLFilter='all';let curPhase=1;let curView='monthly';let curWeek=0;
function loadS(){try{return JSON.parse(localStorage.getItem(SK))||{cl:{},pl:{}};}catch{return{cl:{},pl:{}};}}
function markUnsaved(){unsaved=true;document.getElementById('ubEl').classList.add('sh');document.getElementById('btnSave').classList.add('us');}
function manualSave(){localStorage.setItem(SK,JSON.stringify(S));unsaved=false;document.getElementById('ubEl').classList.remove('sh');document.getElementById('btnSave').classList.remove('us');const t=document.getElementById('stEl');t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),1500);}
function resetAll(){if(confirm('⚠️ รีเซ็ตข้อมูลทั้งหมด? ความก้าวหน้าจะหายหมด!')){S={cl:{},pl:{}};manualSave();render();}}
window.addEventListener('beforeunload',e=>{if(unsaved){e.preventDefault();e.returnValue='';}});

// ====== HELPERS ======
function clStatus(id){return S.cl[id]||'not_started';}
function clSet(id,v){S.cl[id]=v;markUnsaved();render();}
function clToggle(id,checked){S.cl[id]=checked?'done':'not_started';markUnsaved();render();}
function plKey(p,m,t){return `p${p}_m${m}_t${t}`;}
function plDone(k){return S.pl[k]===true;}
function plToggle(k){S.pl[k]=!S.pl[k];markUnsaved();render();}
function wKey(p,w,d,s){return `p${p}_w${w}_d${d}_s${s}`;}

// ====== PROGRESS ======
function clSubjProg(sid){let t=0,d=0;const sub=CL_SUBJECTS.find(s=>s.id===sid);if(!sub)return{t:0,d:0,p:0};sub.cats.forEach(c=>c.items.forEach(i=>{t++;if(clStatus(i.id)==='done')d++;}));return{t,d,p:t?Math.round(d/t*100):0};}
function plPhaseProg(pid){let t=0,d=0;(MD[pid]||[]).forEach((m,mi)=>m.t.forEach((tk,ti)=>{t++;if(plDone(plKey(pid,mi,ti)))d++;}));return{t,d,p:t?Math.round(d/t*100):0};}
function overallProg(){let t=0,d=0;CL_SUBJECTS.forEach(s=>{const p=clSubjProg(s.id);t+=p.t;d+=p.d;});[1,2,3,4].forEach(pid=>{const p=plPhaseProg(pid);t+=p.t;d+=p.d;});return{t,d,p:t?Math.round(d/t*100):0};}

// ====== RENDER ======
function render(){renderDash();if(curSec==='checklist')renderCL();else renderPL();}
function switchSec(s){curSec=s;document.getElementById('btnCL').classList.toggle('act',s==='checklist');document.getElementById('btnPL').classList.toggle('act',s==='planner');document.getElementById('secCL').classList.toggle('act',s==='checklist');document.getElementById('secPL').classList.toggle('act',s==='planner');render();}
function renderDash(){const el=document.getElementById('dashEl');const all=CL_SUBJECTS.map(s=>{const p=clSubjProg(s.id);return`<div class="dc"><div class="dl">${s.icon} ${s.name}</div><div class="dv" style="color:${s.color}">${p.p}%</div><div class="db"><div class="df" style="width:${p.p}%;background:${s.color}"></div></div></div>`;});const ov=overallProg();el.innerHTML=`<div class="dc" style="border-color:#6c5ce7"><div class="dl">📊 รวมทั้งหมด</div><div class="dv" style="color:#a29bfe">${ov.p}%</div><div class="db"><div class="df" style="width:${ov.p}%;background:#6c5ce7"></div></div></div>`+all.join('');}

// ====== CHECKLIST RENDER ======
function renderCL(){const el=document.getElementById('secCL');let h='<div class="ctabs">';CL_SUBJECTS.forEach(s=>{h+=`<button class="ctab ${s.tab} ${s.id===curCLSubj?'act':''}" onclick="switchCLSubj('${s.id}')">${s.icon} ${s.name}</button>`;});h+='</div><div class="cfilts">';
['all','easy','medium','hard','incomplete'].forEach(f=>{const lbl={all:'ทั้งหมด',easy:'🟢 เก็บง่าย',medium:'🟡 ออกเยอะ',hard:'🔴 สายโหด',incomplete:'⬜ ยังไม่เสร็จ'}[f];h+=`<button class="cflt ${curCLFilter===f?'act':''}" onclick="switchCLFilter('${f}')">${lbl}</button>`;});h+='</div>';
const sub=CL_SUBJECTS.find(s=>s.id===curCLSubj);if(sub){if(sub.info)h+=`<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:10px 14px;margin-bottom:14px;border-left:3px solid ${sub.color};font-size:.75rem;color:#aaa;line-height:1.5"><strong style="color:${sub.color}">${sub.icon} ${sub.name}</strong> — ${sub.info}</div>`;sub.cats.forEach(cat=>{if(['easy','medium','hard'].includes(curCLFilter)&&curCLFilter!==cat.g)return;const items=curCLFilter==='incomplete'?cat.items.filter(i=>clStatus(i.id)!=='done'):cat.items;if(items.length===0)return;
let done=items.filter(i=>clStatus(i.id)==='done').length;const pct=items.length?Math.round(done/items.length*100):0;
const bc=cat.g==='easy'?'be':cat.g==='medium'?'bm':'bh';const fc=cat.g==='easy'?'fe':cat.g==='medium'?'fm':'fh';
h+=`<div class="ccat"><div class="cch"><span class="cct">${cat.title}</span><span class="ccb ${bc}">${cat.g==='easy'?'🟢 เก็บง่าย':cat.g==='medium'?'🟡 ออกเยอะ':'🔴 สายโหด'}</span><span class="ccp">${done}/${items.length}</span></div><div class="cpb"><div class="cpf ${fc}" style="width:${pct}%"></div></div>`;
items.forEach(i=>{const st=clStatus(i.id);const dn=st==='done';h+=`<div class="ci ${dn?'dn':''}"><input type="checkbox" ${dn?'checked':''} onchange="clToggle('${i.id}',this.checked)"><label><div>${i.l}</div><div class="cd">${i.d}</div></label><select class="cl-status" onchange="clSet('${i.id}',this.value)"><option value="not_started" ${st==='not_started'?'selected':''}>⬜ ยังไม่เริ่ม</option><option value="in_progress" ${st==='in_progress'?'selected':''}>🔄 กำลังอ่าน</option><option value="review" ${st==='review'?'selected':''}>📝 ทบทวน</option><option value="done" ${st==='done'?'selected':''}>✅ เสร็จแล้ว</option></select></div>`;});h+='</div>';});}
el.innerHTML=h;}
function switchCLSubj(id){curCLSubj=id;renderCL();}
function switchCLFilter(f){curCLFilter=f;renderCL();}

// ====== PLANNER RENDER ======
function renderPL(){const el=document.getElementById('secPL');let h='<div class="ptabs">';PHASES.forEach(p=>{const pp=plPhaseProg(p.id);h+=`<button class="ptab ${p.id===curPhase?'act':''}" style="${p.id===curPhase?'background:'+p.color:''}" onclick="switchPhase(${p.id})">${p.badge} (${pp.p}%)</button>`;});h+='</div><div class="pvtabs">';
['monthly','weekly','daily'].forEach(v=>{const lbl={monthly:'📅 รายเดือน',weekly:'📆 รายสัปดาห์',daily:'⏰ รายวัน'}[v];h+=`<button class="pvt ${curView===v?'act':''}" onclick="switchView('${v}')">${lbl}</button>`;});h+='</div>';
// Subject progress for phase
const months=MD[curPhase]||[];const phase=PHASES.find(p=>p.id===curPhase);
h+='<div class="spg">';PL_SUBJECTS.forEach(s=>{if(s.id==='rest')return;let t=0,d=0;months.forEach((m,mi)=>m.t.forEach((tk,ti)=>{if(tk.s===s.id){t++;if(plDone(plKey(curPhase,mi,ti)))d++;}}));if(!t)return;const p=Math.round(d/t*100);h+=`<div class="spc" style="border-color:${s.color}"><div class="sn" style="color:${s.color}">${s.icon} ${s.name}</div><div class="sb"><div class="sf" style="width:${p}%;background:${s.color}"></div></div><div class="sp">${d}/${t} (${p}%)</div></div>`;});h+='</div>';
if(curView==='monthly')h+=renderMonthly(months,phase);
else if(curView==='weekly')h+=renderWeekly(phase);
else h+=renderDaily(phase);
el.innerHTML=h;}
function switchPhase(p){curPhase=p;curWeek=0;renderPL();}
function switchView(v){curView=v;renderPL();}

function renderMonthly(months,phase){let h='';months.forEach((m,mi)=>{const done=m.t.filter((_,ti)=>plDone(plKey(curPhase,mi,ti))).length;const pct=m.t.length?Math.round(done/m.t.length*100):0;h+=`<div class="pmb"><h4>${m.lb} <span style="float:right;font-size:.7rem;color:#888">${done}/${m.t.length} (${pct}%)</span></h4><div class="pmbr"><div class="pmbf" style="width:${pct}%;background:${phase.color}"></div></div>`;
m.t.forEach((tk,ti)=>{const k=plKey(curPhase,mi,ti);const d=plDone(k);const sub=PL_SUBJECTS.find(s=>s.id===tk.s);const tc=sub?sub.tc:'t-rest';h+=`<div class="pt ${d?'dn':''}"><div class="pc ${d?'ck':''}" onclick="plToggle('${k}')"></div><span class="tg ${tc}">${sub?sub.icon:''} ${sub?sub.name:'พัก'}</span><span class="ptx">${tk.x}</span></div>`;});h+='</div>';});return h;}

function renderWeekly(phase){const tmpl=WT[curPhase]||[];let wt=0,wd=0;tmpl.forEach((day,di)=>day.sl.forEach((_,si)=>{wt++;if(plDone(wKey(curPhase,curWeek,di,si)))wd++;}));const wp=wt?Math.round(wd/wt*100):0;
let h=`<div class="wnav"><button onclick="chgWeek(-1)">◀</button><span style="font-size:.8rem;color:#ccc">สัปดาห์ ${curWeek+1} — ${wp}% (${wd}/${wt})</span><button onclick="chgWeek(1)">▶</button></div>`;
h+=`<div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:12px"><div style="height:100%;width:${wp}%;background:${phase.color};border-radius:2px"></div></div>`;
h+='<div class="wgrid">';tmpl.forEach((day,di)=>{h+=`<div class="wcell"><div class="wdn" style="color:${phase.color}">${day.d}</div>`;day.sl.forEach((sl,si)=>{const k=wKey(curPhase,curWeek,di,si);const d=plDone(k);const sub=PL_SUBJECTS.find(s=>s.id===sl.s);h+=`<div class="wsl" onclick="plToggle('${k}')"><div class="wdot ${d?'ck':''}"></div><span class="tg ${sub?sub.tc:'t-rest'}">${sub?sub.icon:''}</span><span>${sl.t.split('-')[0]}</span></div>`;});h+='</div>';});h+='</div>';
// Detail below
tmpl.forEach((day,di)=>{h+=`<div class="pmb"><h4 style="color:${phase.color}">📌 ${day.d}</h4>`;day.sl.forEach((sl,si)=>{const k=wKey(curPhase,curWeek,di,si);const d=plDone(k);const sub=PL_SUBJECTS.find(s=>s.id===sl.s);h+=`<div class="dsl"><div class="dt">${sl.t}</div><div class="dc2"><div class="dsn" style="color:${sub?sub.color:'#636e72'}">${sub?sub.icon+' '+sub.name:'🛌 พัก'}</div><div class="dsd" style="${d?'text-decoration:line-through':''}">${sl.x}</div></div><div class="dck ${d?'ck':''}" onclick="plToggle('${k}')"></div></div>`;});h+='</div>';});return h;}
function chgWeek(delta){curWeek=Math.max(0,curWeek+delta);renderPL();}

function renderDaily(phase){const tmpl=WT[curPhase]||[];const dow=new Date().getDay();const map=[6,0,1,2,3,4,5];const idx=map[dow];const day=tmpl[idx];if(!day)return'<p style="text-align:center;color:#888;padding:30px">ไม่มีตาราง</p>';
const dn=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];const tm=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];const now=new Date();const ds=`${now.getDate()} ${tm[now.getMonth()]} ${now.getFullYear()+543}`;
let dt=day.sl.length,dd=day.sl.filter((_,si)=>plDone(wKey(curPhase,curWeek,idx,si))).length;const dp=dt?Math.round(dd/dt*100):0;
